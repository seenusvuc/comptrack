services:
  - type: web
    name: comptrack-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:push && node dist/main.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PORT
        sync: false
